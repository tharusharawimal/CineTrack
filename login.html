<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to CineTrack">
    <title>Login - CineTrack</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo a {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }

        .auth-logo p {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        .auth-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .auth-card .form-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .auth-card .form-control {
            background: var(--light-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .auth-card .form-control:focus {
            background: var(--light-bg);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.15);
        }

        .auth-card .form-control::placeholder {
            color: #555;
        }

        .auth-card .form-control.is-invalid {
            border-color: #dc3545;
        }

        .auth-submit-btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .auth-submit-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-1px);
        }

        .auth-submit-btn:active {
            transform: translateY(0);
        }

        .auth-divider {
            text-align: center;
            color: var(--text-secondary);
            margin: 1.2rem 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--border-color);
        }

        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }

        .auth-footer-link {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer-link a:hover {
            text-decoration: underline;
        }

        .input-icon-wrap {
            position: relative;
        }

        .input-icon-wrap > .bi {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 5;
        }

        .password-toggle .bi {
            pointer-events: none;
        }

        .input-icon-wrap .form-control {
            padding-left: 2.5rem;
        }

        .password-toggle {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            z-index: 5;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .back-home {
            text-align: center;
            margin-top: 1.2rem;
        }

        .back-home a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-home a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🎬 CineTrack</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="browse.html">Browse</a></li>
                    <li class="nav-item"><a class="nav-link" href="watchlist.html" onclick="return checkWatchlistAccess(event)">Watchlist</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item auth-nav-item"></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Auth Page -->
    <div class="auth-page-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html">🎬 CineTrack</a>
                <p>Sign in to access your watchlist and more</p>
            </div>

            <h2 class="auth-title">Welcome Back</h2>

            <!-- Alert container -->
            <div id="auth-alert" style="display: none;"></div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="mb-3">
                    <label for="loginIdentifier" class="form-label">Username or Email</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text"
                               class="form-control"
                               id="loginIdentifier"
                               placeholder="Enter username or email"
                               required>
                        <div class="invalid-feedback">Please enter your username or email</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password"
                               class="form-control"
                               id="loginPassword"
                               placeholder="Enter your password"
                               style="padding-right: 3rem;"
                               required>
                        <button type="button" 
                                class="password-toggle" 
                                onclick="togglePasswordVisibility('loginPassword', this)"
                                title="Show password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback">Please enter your password</div>
                </div>

                <button type="submit" class="auth-submit-btn" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <div class="auth-divider">or</div>

            <div class="auth-footer-link">
                Don't have an account? <a href="register.html">Create one now</a>
            </div>

            <div class="back-home">
                <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth JS (before main.js) -->
    <script src="js/auth.js"></script>
    <!-- Main JS -->
    <script src="js/main.js"></script>

    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', function () {
            const user = getCurrentUser();
            if (user) {
                window.location.href = 'index.html';
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Basic validation
            let valid = true;

            if (!identifier) {
                document.getElementById('loginIdentifier').classList.add('is-invalid');
                valid = false;
            } else {
                document.getElementById('loginIdentifier').classList.remove('is-invalid');
            }

            if (!password) {
                document.getElementById('loginPassword').classList.add('is-invalid');
                valid = false;
            } else {
                document.getElementById('loginPassword').classList.remove('is-invalid');
            }

            if (!valid) return false;

            // Submit to PHP backend
            const formData = new FormData();
            formData.append('email_or_username', identifier);
            formData.append('password', password);

            try {
                const response = await fetch('auth/login.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    // Also save to localStorage for JS auth compatibility
                    localStorage.setItem('cinetrack_session', JSON.stringify(result.user));
                    showAuthAlert('Login successful! Redirecting...', 'success');
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || 'index.php';
                    setTimeout(() => { window.location.href = redirect; }, 1000);
                } else {
                    showAuthAlert(result.message, 'danger');
                }
            } catch (err) {
                showAuthAlert('Connection error. Please try again.', 'danger');
            }

            return false;
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
                btn.setAttribute('title', 'Hide password');
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
                btn.setAttribute('title', 'Show password');
            }
        }

        function showAuthAlert(message, type) {
            const alertEl = document.getElementById('auth-alert');
            alertEl.style.display = 'block';
            alertEl.innerHTML = `
                <div class="alert alert-${type} alert-dismissible" role="alert" style="border-radius: 8px;">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }
    </script>
</body>
</html>
